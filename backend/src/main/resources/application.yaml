spring:
  application:
    name: gRPC-spring
  grpc:
    server:
      address: 0.0.0.0
      port: 9090
    client:
      channels:
        messager:
          address: static://127.0.0.1:9090
          negotiation-type: plaintext

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    org:
      springframework:
        grpc: DEBUG